name: Update Screenshots

on:
  push:
    branches: [ main ]
    paths:
      - 'kmp-loading-animation/src/**'
      - 'composeApp/src/**'
  workflow_dispatch:

jobs:
  update-screenshots:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Record Roborazzi GIF
        run: ./gradlew :composeApp:jvmTest

      - name: Commit updated screenshots
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add screenshots/*.gif
          git diff --staged --quiet || git commit -m "chore: update animated screenshots [skip ci]"
          git push

